document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:1.08;font-weight:800;letter-spacing:-.035em\">Three projects I'm<br>genuinely proud of.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:22px\">\n      <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"3\">\n        <a href=\"{{ p.repo }}\" target=\"_blank\" data-glow=\"\" class=\"r-proj\" style=\"position:relative;overflow:hidden;display:grid;grid-template-columns:1.45fr 1fr;gap:0;background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:28px;box-shadow:0 4px 26px rgba(0,0,0,.04);transition:transform .3s,box-shadow .3s\" style-hover=\"transform:translateY(-6px);box-shadow:0 28px 60px rgba(0,0,0,.12)\">\n          <div data-glow-layer=\"\" style=\"position:absolute;inset:0;border-radius:28px;background:radial-gradient(500px circle at var(--gx,50%) var(--gy,50%),rgba(232,133,14,.1),transparent 42%);opacity:0;transition:opacity .3s;pointer-events:none\"><\u002Fdiv>\n          <div style=\"position:relative;padding:42px 42px 38px\">\n            <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n              <span style=\"font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--accent,#e8850e);text-transform:uppercase\">{{ p.tag }}<\u002Fspan>\n              <span style=\"font-size:13px;color:#c7c7cc\">/ {{ p.id }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-size:clamp(26px,4vw,34px);font-weight:700;letter-spacing:-.03em;line-height:1.08;margin-bottom:16px\">{{ p.name }}<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.62;color:#6e6e73;font-weight:500;margin-bottom:26px;max-width:520px\">{{ p.desc }}<\u002Fp>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px\">\n              <sc-for list=\"{{ p.stack }}\" as=\"t\" hint-placeholder-count=\"5\">\n                <span style=\"font-size:13px;font-weight:500;color:#1d1d1f;padding:7px 14px;background:#f5f5f7;border-radius:100px\">{{ t }}<\u002Fspan>\n ransform:translateY(-6px);box-shadow:0 22px 48px rgba(0,0,0,.1)\">\n          <div data-glow-layer=\"\" style=\"position:absolute;inset:0;border-radius:22px;background:radial-gradient(380px circle at var(--gx,50%) var(--gy,50%),rgba(232,133,14,.12),transparent 45%);opacity:0;transition:opacity .3s;pointer-events:none\"><\u002Fdiv>\n          <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;margin-bottom:38px\">\n            <span style=\"font-size:12px;font-weight:700;letter-spacing:.1em;color:#a4332c\">HARVARD · edX<\u002Fspan>\n            <span style=\"font-size:16px;color:#c7c7cc\">↗<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position:relative;font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:8px\">{{ c.code }}<\u002Fdiv>\n          <div style=\"position:relative;font-size:15px;color:#6e6e73;font-weight:500;line-height:1.45;margin-bottom:22px\">{{ c.title }}<\u002Fdiv>\n          <div style=\"position:relative;display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--accent,#e8850e)\">View certificate<\u002Fdiv>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STACK -->\n  <section class=\"r-pad\" style=\"position:relative;z-index:2;max-width:1120px;margin:0 auto;padding:72px 32px 40px\">\n    <div style=\"text-align:center;max-width:640px;margin:0 auto 48px\">\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:.14em;color:var(--accent,#e8850e);text-transform:uppercase;margin-bottom:18px\">Toolkit<\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,5.4vw,48px);line-height:1.08;font-weight:800;letter-spacing:-.035em\">The stack I build with.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"r-g3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n      <sc-for list=\"{{ skills }}\" as=\"g\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:20px;padding:26px 26px;box-shadow:0 2px 14px rgba(0,0,0,.03)\">\n          <div style=\"font-size:16px;font-weight:700;margin-bottom:14px;letter-spacing:-.02em\">{{ g.cat }}<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n            <sc-for list=\"{{ g.items }}\" as=\"i\" hint-placeholder-count=\"4\">\n              <span style=\"font-size:13.5px;font-weight:500;color:#1d1d1f;padding:7px 13px;background:#f5f5f7;border-radius:100px\">{{ i }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer class=\"r-pad\" style=\"position:relative;z-index:2;max-width:1120px;margin:60px auto 0;padding:30px 32px 0\">\n    <div class=\"r-card\" style=\"background:linear-gradient(165deg,#1d1d1f,#2b2a28);border-radius:32px;padding:72px 48px;text-align:center;color:#fff;box-shadow:0 30px 70px rgba(0,0,0,.18)\">\n      <h2 style=\"font-size:clamp(34px,6.4vw,56px);font-weight:800;letter-spacing:-.04em;line-height:1.04;margin-bottom:20px\">Let's build<br>something good.<\u002Fh2>\n      <p style=\"font-size:18px;color:rgba(255,255,255,.62);max-width:440px;margin:0 auto 36px;font-weight:500\">Open to research collaboration, freelance and academic projects.<\u002Fp>\n      <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap\">\n        <a href=\"https://www.linkedin.com/in/malik-hasham-mehboob-336b95358/\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 30px;background:var(--accent,#e8850e);color:#fff;border-radius:100px;font-weight:600;font-size:16px;transition:transform .2s\" style-hover=\"transform:translateY(-2px)\">LinkedIn ↗<\u002Fa>\n        <a href=\"https://github.com/hasham-tdl\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 30px;background:rgba(255,255,255,.12);color:#fff;border-radius:100px;font-weight:600;font-size:16px;transition:background .2s\" style-hover=\"background:rgba(255,255,255,.2)\">GitHub ↗<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:13px;color:#86868b;padding:30px 4px 44px;font-weight:500\">\n      <span>© 2026 Malik Hasham Mehboob<\u002Fspan>\n      <span>Designed &amp; built with intent.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;bgColor&quot;: {\n    &quot;editor&quot;: &quot;color&quot;,\n    &quot;default&quot;: &quot;#fbfbfd&quot;,\n    &quot;tsType&quot;: &quot;string&quot;,\n    &quot;options&quot;: [&quot;#fbfbfd&quot;, &quot;#ffffff&quot;, &quot;#f5f5f7&quot;, &quot;#f4f1ec&quot;]\n  },\n  &quot;accentColor&quot;: {\n    &quot;editor&quot;: &quot;color&quot;,\n    &quot;default&quot;: &quot;#e8850e&quot;,\n    &quot;tsType&quot;: &quot;string&quot;,\n    &quot;options&quot;: [&quot;#e8850e&quot;, &quot;#0071e3&quot;, &quot;#1d1d1f&quot;, &quot;#d6336c&quot;]\n  }\n}\">\nclass Component extends DCLogic {\n  componentDidMount() { this.applyTheme(); this.wireGlow(); }\n  componentDidUpdate() { this.applyTheme(); this.wireGlow(); }\n  applyTheme() {\n    const r = document.documentElement;\n    r.style.setProperty('--bg', this.props.bgColor || '#fbfbfd');\n    r.style.setProperty('--accent', this.props.accentColor || '#e8850e');\n  }\n  wireGlow() {\n    const cards = document.querySelectorAll('[data-glow]');\n    cards.forEach((card) => {\n      if (card.dataset.glowWired) return;\n      card.dataset.glowWired = '1';\n      const layer = card.querySelector('[data-glow-layer]');\n      if (!layer) return;\n      card.addEventListener('mouseenter', () => { layer.style.opacity = '1'; });\n      card.addEventListener('mouseleave', () => { layer.style.opacity = '0'; });\n      card.addEventListener('mousemove', (e) => {\n        const b = card.getBoundingClientRect();\n        layer.style.setProperty('--gx', (e.clientX - b.left) + 'px');\n        layer.style.setProperty('--gy', (e.clientY - b.top) + 'px');\n      });\n    });\n  }\n  renderVals() {\n    return {\n      stats: [\n        { v: 'AI / ML', l: 'Vision, LLMs & forecasting systems' },\n        { v: 'Security', l: 'Pen-testing & secure systems' },\n        { v: 'Robotics', l: 'Arduino & Raspberry Pi builds' },\n        { v: 'CS50 ×3', l: 'Harvard — CS · AI · Cybersecurity' },\n      ],\n      doing: [\n        { n: 1, t: 'Machine learning & AI-powered chatbots' },\n        { n: 2, t: 'Python development for real use cases' },\n        { n: 3, t: 'Flask & Django web applications' },\n        { n: 4, t: 'Penetration testing — Hack The Box' },\n        { n: 5, t: 'CS Olympiads & competitive problem-solving' },\n        { n: 6, t: 'Robotics with Arduino & Raspberry Pi' },\n      ],\n      projects: [\n        {\n          id: '01',\n          name: 'Driver Monitoring System v2',\n          tag: 'Computer Vision',\n          repo: 'https://github.com/hasham-tdl/Driver-Monitoring-System-v2',\n          desc: 'Real-time drowsiness, phone-distraction and smoking detection on commodity hardware. Fuses MediaPipe landmarks, iris-normalized lid geometry and a purpose-trained eye-state CNN — validated against a hand-labeled ground-truth suite, not eyeballed demos.',\n          stack: ['MediaPipe', 'YOLO11', 'ONNX', 'OpenCV', 'Raspberry Pi'],\n          metrics: [\n            { v: '97.8%', l: 'eye-CNN validation accuracy' },\n            { v: '~30 FPS', l: 'on Raspberry Pi 4' },\n            { v: '11/11 · 0', l: 'alerts fired · false alarms' },\n          ],\n        },\n        {\n          id: '02',\n          name: 'RangeCast',\n          tag: 'Quant ML',\n          repo: 'https://github.com/hasham-tdl/rangecast',\n          desc: 'Forecasts the one thing in markets that is actually predictable — tomorrow\\u2019s trading range. A linear HAR backbone carries the volatility level, quantile-LightGBM corrects residuals, and conformal calibration keeps the bands honest. Graded only on data it never saw.',\n          stack: ['LightGBM', 'Conformal', 'NumPy', 'Pandas'],\n          metrics: [\n            { v: '0.58', l: 'R\\u00b2 out-of-sample (SPY)' },\n            { v: '~80%', l: 'band coverage, calibrated' },\n            { v: '20+ yr', l: 'walk-forward tested' },\n          ],\n        },\n        {\n          id: '03',\n          name: 'RAG PDF Q&A',\n          tag: 'LLM · Retrieval',\n          repo: 'https://github.com/hasham-tdl/rag-pdf-qa',\n          desc: 'A fully local Retrieval-Augmented Generation system for querying PDFs in natural language. Local embeddings and LLMs via Ollama, FAISS vector search and prompt-grounded answers — private and completely offline after setup, with hallucinations cut by grounding every answer.',\n          stack: ['LangChain', 'FAISS', 'Ollama', 'PyMuPDF'],\n          metrics: [\n            { v: '100%', l: 'local & offline' },\n            { v: 'FAISS', l: 'semantic vector search' },\n            { v: 'grounded', l: 'reduced hallucination' },\n          ],\n        },\n      ],\n      certs: [\n        { code: 'CS50x', title: 'Introduction to Computer Science', url: 'https://certificates.cs50.io/a3b2593b-f395-49c2-b431-b9c740b9abc7.pdf?size=letter' },\n        { code: 'CS50 AI', title: 'Artificial Intelligence with Python', url: 'https://certificates.cs50.io/f5ae1652-1ebc-4ef6-b78a-6b97dfb386d3.pdf?size=letter' },\n        { code: 'CS50 Security', title: 'Introduction to Cybersecurity', url: 'https://certificates.cs50.io/60ace6a5-ced3-4a91-a9c3-af82716d24e4.pdf?size=letter' },\n      ],\n      skills: [\n        { cat: 'Languages', items: ['Python', 'C', 'SQL'] },\n        { cat: 'Generative AI', items: ['OpenAI GPT APIs', 'LangChain', 'Ollama', 'FAISS', 'Stable Diffusion'] },\n        { cat: 'ML & Data', items: ['NumPy', 'Pandas', 'LightGBM', 'ONNX', 'OpenCV', 'MediaPipe'] },\n        { cat: 'Web', items: ['Flask', 'Django', 'JavaScript', 'HTML/CSS'] },\n        { cat: 'Security', items: ['Hack The Box', 'Pen-testing', 'VMware', 'sockets'] },\n        { cat: 'Data & Robotics', items: ['MySQL', 'MongoDB', 'Arduino', 'Raspberry Pi'] },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
